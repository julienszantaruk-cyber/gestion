<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
:root {
  --primary: #3e5de7;
  --primary-dark: #2845c1;
  --primary-light: #dce6ff;
  --bg: #f8fafc;
  --card-bg: #fff;
  --text: #1e293b;
  --text-muted: #64748b;
  --text-light: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { display: flex; flex-direction: column; background: var(--bg); }

/* ── Navbar ── */
.navbar {
  flex-shrink: 0;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: stretch;
  gap: 2px;
  height: 44px;
}
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 14px;
  border: none;
  border-bottom: 2px solid transparent;
  background: transparent;
  cursor: pointer;
  color: var(--text-muted);
  font-size: .8rem;
  font-weight: 500;
  transition: color .15s, border-color .15s;
  font-family: inherit;
  white-space: nowrap;
  margin-bottom: -1px;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab svg { flex-shrink: 0; }

/* ── Loading bar ── */
.load-bar {
  position: fixed;
  top: 48px;
  left: 0;
  height: 2px;
  width: 0;
  background: var(--primary);
  z-index: 100;
  transition: width .1s;
  opacity: 0;
}
.load-bar.loading {
  animation: loading-pulse 1.2s ease-in-out infinite;
}
@keyframes loading-pulse {
  0%   { width: 0; opacity: 1; }
  70%  { width: 80%; opacity: 1; }
  100% { width: 100%; opacity: 0; }
}

/* ── Widget frame ── */
#frame {
  flex: 1;
  border: none;
  width: 100%;
  display: block;
  background: var(--bg);
}
</style>
</head>
<body>

<div class="load-bar" id="loadBar"></div>

<nav class="navbar">
  <button class="tab" data-id="dashboard"  onclick="go('dashboard')" >
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    Dashboard
  </button>
  <button class="tab" data-id="kanban"     onclick="go('kanban')"    >
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
    Kanban
  </button>
  <button class="tab" data-id="gantt"      onclick="go('gantt')"     >
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/><rect x="3" y="4" width="8" height="4" rx="1" fill="currentColor" stroke="none"/><rect x="8" y="10" width="10" height="4" rx="1" fill="currentColor" stroke="none"/><rect x="5" y="16" width="6" height="4" rx="1" fill="currentColor" stroke="none"/></svg>
    Gantt
  </button>
  <button class="tab" data-id="calendar"   onclick="go('calendar')"  >
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Calendar
  </button>
  <button class="tab" data-id="whiteboard" onclick="go('whiteboard')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="14" rx="2"/><line x1="3" y1="20" x2="21" y2="20"/><line x1="8" y1="17" x2="8" y2="20"/><line x1="16" y1="17" x2="16" y2="20"/></svg>
    Whiteboard
  </button>
</nav>

<iframe id="frame" allow="clipboard-read; clipboard-write"></iframe>

<script>
const BASE = 'https://nic01asfr.github.io/Widgets-Grist/taskflow/';

const URLS = {
  dashboard:  BASE + 'dashboard/',
  kanban:     BASE + 'kanban/',
  gantt:      BASE + 'gantt/',
  calendar:   BASE + 'calendar/',
  whiteboard: BASE + 'whiteboard/',
};

const frame   = document.getElementById('frame');
const loadBar = document.getElementById('loadBar');
let current   = null;

// ── Transparent Grist relay ───────────────────────────────────────
// The widgets inside the iframe need to talk to Grist (our parent).
// We relay messages transparently in both directions:
//   child  → window.parent  (their Grist API calls)
//   parent → child          (Grist responses & data pushes)
window.addEventListener('message', event => {
  if (event.source === frame.contentWindow) {
    // Child widget → Grist
    window.parent.postMessage(event.data, '*');
  } else if (event.source !== window.self) {
    // Grist → child widget
    try { frame.contentWindow?.postMessage(event.data, '*'); } catch (_) {}
  }
});

// ── Navigation ────────────────────────────────────────────────────
function go(id) {
  if (id === current) return;
  current = id;

  // Highlight active tab
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.id === id)
  );

  // Loading indicator
  loadBar.classList.add('loading');
  frame.onload = () => loadBar.classList.remove('loading');

  // Load widget directly by URL — widgets initialize normally with Grist
  frame.src = URLS[id];
}

// ── Init ──────────────────────────────────────────────────────────
// Register this shell widget with Grist (minimal — only for relay to work)
grist.ready({ requiredAccess: 'full' });

// Default view
go('dashboard');
</script>
</body>
</html>
