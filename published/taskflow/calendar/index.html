                    for (let d = 0; d < 7; d++) {
                        const capturedDate = new Date(date.getTime());
                        const isOther = capturedDate.getMonth() !== m;
                        const dayEl = document.createElement('div');
                        dayEl.className = ['mini-day exp', isOther ? 'other-month' : '', isToday(capturedDate) ? 'today' : ''].filter(Boolean).join(' ');
                        dayEl.textContent = capturedDate.getDate();
                        if (!isOther) {
                            dayEl.addEventListener('click', (e) => { e.stopPropagation(); openDayPanel(capturedDate); });
                        }
                        daysRow.appendChild(dayEl);
                        date = addDays(date, 1);
                    }
                    weekWrapper.appendChild(daysRow);

                    // Mini-barres événements pour cette semaine
                    const barsEl = document.createElement('div');
                    barsEl.className = 'mini-month-bars';

                    const weekTasks = [];
                    ft.forEach(t => {
                        const s = gristToDate(t.dateDebut) || gristToDate(t.dateEcheance);
                        const e = gristToDate(t.dateEcheance) || s;
                        if (!s) return;
                        const ts = startOfDay(s), te = endOfDay(e);
                        if (te >= weekStart && ts <= weekEnd) weekTasks.push({ task: t, start: ts, end: te });
                    });

                    weekTasks.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
                    const lanes = [];
                    const MAX_MINI_LANES = 4;
                    weekTasks.forEach(({ task, start, end }) => {
                        const barStart = Math.max(start.getTime(), weekStart.getTime());
                        const barEnd = Math.min(end.getTime(), weekEnd.getTime());
                        const startDay = Math.floor((barStart - weekStart.getTime()) / 86400000);
                        const endDay = Math.floor((barEnd - weekStart.getTime()) / 86400000);
                        let lane = lanes.findIndex(l => l <= startDay);
                        if (lane === -1) { lane = lanes.length; lanes.push(0); }
                        lanes[lane] = endDay + 1;
                        if (lane < MAX_MINI_LANES) {
                            const bar = document.createElement('div');
                            bar.className = 'mini-event-bar';
                            const color = PRIORITY_COLORS[getPriority(task)] || '#64748b';
                            const continuedLeft = start < weekStart;
                            const continuesRight = end > weekEnd;
                            bar.style.cssText = `left:${startDay / 7 * 100}%; width:${(endDay - startDay + 1) / 7 * 100}%; top:${2 + lane * 7}px; background:${color}; height:5px; border-radius:${continuedLeft ? '0' : '2px'} ${continuesRight ? '0' : '2px'} ${continuesRight ? '0' : '2px'} ${continuedLeft ? '0' : '2px'};`;
                            bar.title = task.titre || 'Sans titre';
                            bar.addEventListener('click', (e) => { e.stopPropagation(); openTaskPanel(task.id); });
                            barsEl.appendChild(bar);
                        }
                    });
                    const usedLanes = Math.min(lanes.length, MAX_MINI_LANES);
                    if (usedLanes > 0) barsEl.style.height = (usedLanes * 7 + 4) + 'px';
                    weekWrapper.appendChild(barsEl);
                    gridEl.appendChild(weekWrapper);
                }

                miniMonth.appendChild(gridEl);
                grid.appendChild(miniMonth);
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // PANEL
        // ═══════════════════════════════════════════════════════════════════════
        function openPanel() {
            panelState.open = true;
            document.getElementById('panel').classList.add('open');
            document.getElementById('gridContainer').classList.add('panel-open');
            document.getElementById('panelOverlay').classList.add('visible');
        }

        function closePanel() {
            panelState.open = false;
            document.getElementById('panel').classList.remove('open');
            document.getElementById('gridContainer').classList.remove('panel-open');
            document.getElementById('panelOverlay').classList.remove('visible');
            panelState = { open: false, mode: null, periodType: null, periodDate: null, periodTasks: [], taskId: null, taskIndex: -1, isNew: false, editData: null };
            render();
        }
        
        function openDayPanel(date) {
            selectedDate = date;
            const ft = getFilteredTasks().filter(t => {
                const s = gristToDate(t.dateDebut), e = gristToDate(t.dateEcheance) || s;
                return s && startOfDay(s) <= date && endOfDay(e || s) >= date;
            });
            panelState = { open: true, mode: 'period', periodType: 'day', periodDate: date, periodTasks: ft, taskId: null, taskIndex: -1, isNew: false, editData: null };
            renderPanelPeriod();
            openPanel();
            render();
        }
        
        function openWeekPanel(date) {
            const weekStart = getWeekStart(date);
            const weekEnd = addDays(weekStart, 6);
            const ft = getFilteredTasks().filter(t => {
                const s = gristToDate(t.dateDebut), e = gristToDate(t.dateEcheance) || s;
                return s && startOfDay(s) <= weekEnd && endOfDay(e || s) >= weekStart;
            });
            panelState = { open: true, mode: 'period', periodType: 'week', periodDate: weekStart, periodTasks: ft, taskId: null, taskIndex: -1, isNew: false, editData: null };
            renderPanelPeriod();
            openPanel();
        }
        
        function openTaskPanel(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            selectedTaskId = taskId;
            const idx = panelState.periodTasks.findIndex(t => t.id === taskId);
            panelState.mode = 'task';
            panelState.taskId = taskId;
            panelState.taskIndex = idx >= 0 ? idx : 0;
            panelState.isNew = false;
            panelState.editData = cloneTaskData(task);
            renderPanelTask();
            openPanel();
            if (gristReady) grist.setSelectedRows([taskId]);
            render();
        }
        
        function openCreatePanel(date = null) {
            const today = new Date();
            const targetDate = date || selectedDate || today;
            panelState = {
                open: true, mode: 'task', periodType: panelState.periodType, periodDate: panelState.periodDate,
                periodTasks: panelState.periodTasks, taskId: null, taskIndex: -1, isNew: true,
                editData: {
                    titre: '', description: '', type: 'tache', priorite: '3', statut: 'todo', progression: 0,
                    dateDebut: dateToGrist(targetDate), dateEcheance: dateToGrist(addDays(targetDate, 7)),
                    projet: projects.length > 0 ? projects[0].id : null,
                    assignees: [], dependDe: [], tags: [], estimationH: null, tempsPasse: null, subtasks: []
                }
            };
            renderPanelTask();
            openPanel();
            render();
            setTimeout(() => document.getElementById('taskTitle')?.focus(), 100);
        }

        function cloneTaskData(task) {
            return {
                titre: task.titre || '',
                description: task.description || '',
                type: task.type || 'tache',
                priorite: String(task.priorite || '3'),
                statut: task.statut || 'todo',
                progression: task.progression || 0,
                dateDebut: task.dateDebut,
                dateEcheance: task.dateEcheance,
                projet: task.projet || null,
                assignees: getAssignees(task),
                dependDe: getDependsOn(task),
                tags: getTags(task),
                estimationH: task.estimationH || null,
                tempsPasse: task.tempsPasse || null,
                subtasks: getSubtasks(task)
            };
        }
        
        // FIX: Synchroniser editData vers le task local dans tasks[]
        function syncLocalTask() {
            if (panelState.isNew || !panelState.taskId) return;
            const task = tasks.find(t => t.id === panelState.taskId);
            const data = panelState.editData;
            if (!task || !data) return;
            task.titre = data.titre;
            task.description = data.description;
            task.type = data.type;
            task.priorite = data.priorite;
            task.statut = data.statut;
            task.progression = data.progression;
            task.dateDebut = data.dateDebut;
            task.dateEcheance = data.dateEcheance;
            task.projet = data.projet;
            task.assignees = ['L', ...data.assignees];
            task.dependDe = ['L', ...data.dependDe];
            task.tags = ['L', ...data.tags];
            task.estimationH = data.estimationH;
            task.tempsPasse = data.tempsPasse;
            task.subtasks = subtasksToJson(data.subtasks);
        }
        
        function backToPeriod() {
            if (panelState.periodType) {
                panelState.mode = 'period';
                panelState.taskId = null;
                panelState.isNew = false;
                panelState.editData = null;
                renderPanelPeriod();
            } else {
                closePanel();
            }
        }
        
        function navigatePanelTask(dir) {
            if (panelState.isNew || panelState.periodTasks.length < 2) return;
            let newIdx = panelState.taskIndex + dir;
            if (newIdx < 0) newIdx = panelState.periodTasks.length - 1;
            if (newIdx >= panelState.periodTasks.length) newIdx = 0;
            const t = panelState.periodTasks[newIdx];
            if (t) openTaskPanel(t.id);
        }

        // ═══════════════════════════════════════════════════════════════════════
        // PANEL PERIOD VIEW
        // ═══════════════════════════════════════════════════════════════════════
        function renderPanelPeriod() {
            const header = document.getElementById('panelHeader');
            const content = document.getElementById('panelContent');
            const footer = document.getElementById('panelFooter');
            
            const { periodType, periodDate, periodTasks } = panelState;
            let title = '';
            if (periodType === 'day') title = formatDate(periodDate, 'full');
            else if (periodType === 'week') title = `Semaine ${getWeekNumber(periodDate)}`;
            
            header.innerHTML = `<div class="panel-nav"><span class="panel-title">${escapeHtml(title)}</span></div><button class="panel-close" onclick="closePanel()">×</button>`;
            
            const done = periodTasks.filter(t => t.statut === 'done').length;
            const total = periodTasks.length;
            
            content.innerHTML = `
                <div class="panel-stats">
                    <div class="panel-stat"><div class="panel-stat-value">${total}</div><div class="panel-stat-label">Tâches</div></div>
                    <div class="panel-stat"><div class="panel-stat-value">${done}/${total}</div><div class="panel-stat-label">Terminées</div></div>
                </div>
                <div class="panel-section"><div class="panel-section-title">Tâches</div>
                    ${periodTasks.length ? periodTasks.map(t => renderTaskCard(t)).join('') : '<div class="panel-empty">Aucune tâche</div>'}
                </div>
            `;
            
            footer.innerHTML = `<button class="panel-btn primary" onclick="openCreatePanel()" style="width:100%">+ Nouvelle tâche</button>`;
        }
        
        function renderTaskCard(t) {
            const p = getPriority(t);
            const projectName = getProjectName(t.projet);
            const projectColor = getProjectColor(t.projet);
            const s = gristToDate(t.dateDebut), e = gristToDate(t.dateEcheance);
            const ds = s ? formatDate(s, 'short') : '';
            
            return `<div class="panel-task-card p${p} ${t.id === selectedTaskId ? 'selected' : ''}" onclick="openTaskPanel(${t.id})">
                <div class="panel-task-title">${t.type === 'jalon' ? '◆ ' : ''}${escapeHtml(t.titre) || 'Sans titre'}</div>
                <div class="panel-task-meta"><span>${ds}</span>${projectName ? `<span style="color:${projectColor}">● ${escapeHtml(projectName)}</span>` : ''}</div>
                ${t.type !== 'jalon' ? `<div class="panel-task-progress"><div class="panel-task-progress-bar p${p}" style="width:${t.progression || 0}%"></div></div>` : ''}
            </div>`;
        }

            header.innerHTML = `
                <div class="panel-nav">
                    <button class="panel-nav-btn" onclick="backToPeriod()" title="Retour">←</button>

                    ${navLabel ? `<span class="panel-title">${navLabel}</span>` : ''}

            const assignLabel = data.type === 'reunion' ? 'Participants' : 'Assignés';

            // Assignés

            const depsOptions = availableDeps.map(t =>

            const estim = data.estimationH || 0;
            const passe = data.tempsPasse || 0;
            const timePercent = estim > 0 ? Math.min((passe / estim) * 100, 100) : 0;
            const timeOver = passe > estim && estim > 0;

            // Prérequis jalon (auto depuis dependDe)
            const doneCount = data.dependDe.filter(id => { const t = tasks.find(x => x.id === id); return t?.statut === 'done'; }).length;

                    </div>
                    ${data.type === 'tache' ? `

                        <span class="prop-label">Progression</span>
                        <div class="prop-value">
                            <div class="progress-inline-wrap">
                                <div class="progress-bar-mini"><div class="progress-bar-mini-fill" id="progressBarFill" style="width:${data.progression}%"></div></div>
                                <span class="progress-pct-label" id="progressValue">${data.progression}%</span>

                    <div class="panel-section-header"><span class="panel-section-title">Détails</span></div>
                    ${data.type !== 'reunion' ? `
                    <div class="form-group"><div class="time-row"><div class="time-group"><label>Estimé</label><div class="time-input-wrap"><input type="number" min="0" step="0.5" value="${estim || ''}" placeholder="0" onchange="updateField('estimationH', parseFloat(this.value) || null)"><span>h</span></div></div><div class="time-group"><label>Passé</label><div class="time-input-wrap"><input type="number" min="0" step="0.5" value="${passe || ''}" placeholder="0" onchange="updateField('tempsPasse', parseFloat(this.value) || null)"><span>h</span></div></div></div>${estim > 0 ? `<div class="time-bar"><div class="time-bar-fill ${timeOver ? 'over' : ''}" style="width:${timePercent}%"></div></div>` : ''}</div>
                    ` : ''}
                    <div class="form-group"><div class="tags-input" onclick="document.getElementById('tagInput').focus()">${tagsChips}<input type="text" id="tagInput" placeholder="${data.tags.length ? '' : 'Ajouter un tag...'}" onkeydown="handleTagKeydown(event)"></div></div>
                    ${data.type !== 'reunion' ? `
                    <div class="form-group"><div class="multi-select" id="depsSelect"><div class="multi-select-trigger" onclick="toggleMultiSelect('depsSelect')"><div class="multi-select-values">${depsChips || '<span class="multi-select-placeholder">Dépendances...</span>'}</div><span class="multi-select-arrow">▾</span></div><div class="multi-select-dropdown">${depsOptions || '<div class="multi-select-empty">Aucune</div>'}</div></div>${blockedHtml}</div>
                    ` : ''}
                </div>
                ` : ''}

                ${!panelState.isNew ? `<div class="panel-footer-left"><button class="panel-btn danger" onclick="showDeleteConfirm()" style="width:auto;padding:10px 14px">Suppr.</button></div><div class="delete-confirm" id="deleteConfirm"><div class="delete-confirm-text">Supprimer ?</div><div class="delete-confirm-actions"><button class="delete-confirm-btn cancel" onclick="hideDeleteConfirm()">Annuler</button><button class="delete-confirm-btn confirm" onclick="confirmDelete()">Supprimer</button></div></div>` : ''}
            `;

            // Footer
            if (panelState.isNew) {
                const canCreate = data.titre && data.titre.trim().length > 0;
                footer.innerHTML = `<div class="panel-footer-right" style="width:100%"><button class="panel-btn success" onclick="createTask()" ${!canCreate ? 'disabled' : ''} style="width:100%">Créer la tâche</button></div>`;
            } else {
                footer.innerHTML = '';
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // FIELD UPDATES & HANDLERS
        // ═══════════════════════════════════════════════════════════════════════
        function updateField(field, value, noSave = false) {
            const data = panelState.editData;
            if (!data) return;
            
            // BUG-01 FIX: Convert date strings to Grist timestamps using robust parsing
            if (field === 'dateDebut' || field === 'dateEcheance') {
                value = value ? dateToGrist(parseInputDate(value)) : null;
            }
            
            data[field] = value;
            
            // Jalon: sync dates
            if (field === 'type' && value === 'jalon' && data.dateDebut) {
                data.dateEcheance = data.dateDebut;
            }
            
            // FIX: Synchroniser le task local pour affichage immédiat
            syncLocalTask();
            
            // Visual fields requiring re-render
            const visualFields = ['type', 'priorite', 'statut', 'projet', 'progression', 'dateDebut', 'dateEcheance'];
            if (visualFields.includes(field)) {
                renderPanelTask();
                if (!panelState.isNew) render();
            }
            
            // Enable/disable create button
            if (field === 'titre' && panelState.isNew) {
                const btn = document.querySelector('.panel-footer .panel-btn');
                if (btn) btn.disabled = !value || !value.trim();
            }
            
            // Auto-save for existing tasks
            if (!panelState.isNew && !noSave && gristReady) {
                saveTaskToGrist();
            }
        }

        function setProgressPreset(value) {
            const data = panelState.editData;
            if (!data) return;
            data.progression = value;
            syncLocalTask();

            const slider = document.querySelector('.progress-slider');
            const valueSpan = document.getElementById('progressValue');
            const barFill = document.getElementById('progressBarFill');
            if (slider) slider.value = value;
            if (valueSpan) valueSpan.textContent = value + '%';
            if (barFill) barFill.style.width = value + '%';
            document.querySelectorAll('.progress-preset').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.textContent) === value);
            });
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            render();
        }

        function setTodayDate() {
            const data = panelState.editData;
            if (!data) return;
            const today = dateToGrist(new Date());
            data.dateDebut = today;
            if (data.type === 'jalon') data.dateEcheance = today;
            syncLocalTask();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }

        // Subtasks/Checklist
        function getSubtasks(task) {
            if (!task?.subtasks) return [];
            try { return JSON.parse(task.subtasks); } catch (e) { return []; }
        }
        function subtasksToJson(subtasks) {
            return JSON.stringify(subtasks || []);
        }
        function addSubtask() {
            const input = document.getElementById('newSubtaskInput');
            const text = input?.value?.trim();
            if (!text) return;
            const data = panelState.editData;
            if (!data.subtasks) data.subtasks = [];
            data.subtasks.push({ id: Date.now(), text: text, done: false });
            input.value = '';
            updateSubtaskProgress();
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }
        function toggleSubtask(id) {
            const data = panelState.editData;
            if (!data.subtasks) return;
            const st = data.subtasks.find(s => s.id === id);
            if (st) {
                st.done = !st.done;
                updateSubtaskProgress();
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();
            }
        }
        function removeSubtask(id) {
            const data = panelState.editData;
            if (!data.subtasks) return;
            const idx = data.subtasks.findIndex(s => s.id === id);
            if (idx !== -1) {
                data.subtasks.splice(idx, 1);
                updateSubtaskProgress();
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();
            }
        }
        function updateSubtaskProgress() {
            const data = panelState.editData;
            if (!data.subtasks || data.subtasks.length === 0) return;
            const done = data.subtasks.filter(s => s.done).length;
            const total = data.subtasks.length;
            data.progression = Math.round((done / total) * 100);
            syncLocalTask();
        }
        function handleSubtaskKeydown(e) {
            if (e.key === 'Enter') { e.preventDefault(); addSubtask(); }
        }

        function toggleMultiSelect(id) {
            const el = document.getElementById(id);
            document.querySelectorAll('.multi-select').forEach(s => { if (s.id !== id) s.classList.remove('open'); });
            el.classList.toggle('open');
        }
        
        function toggleAssignee(id) {
            const data = panelState.editData;
            const idx = data.assignees.indexOf(id);
            if (idx === -1) data.assignees.push(id);
            else data.assignees.splice(idx, 1);
            syncLocalTask();  // FIX
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
            render();
        }
        
        function removeAssignee(id) {
            const data = panelState.editData;
            const idx = data.assignees.indexOf(id);
            if (idx !== -1) {
                data.assignees.splice(idx, 1);
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
                render();
            }
        }
        
        function toggleDependency(id) {
            const data = panelState.editData;
            const idx = data.dependDe.indexOf(id);
            if (idx === -1) data.dependDe.push(id);
            else data.dependDe.splice(idx, 1);
            syncLocalTask();  // FIX
            if (!panelState.isNew && gristReady) saveTaskToGrist();
            renderPanelTask();
        }
        
        function removeDependency(id) {
            const data = panelState.editData;
            const idx = data.dependDe.indexOf(id);
            if (idx !== -1) {
                data.dependDe.splice(idx, 1);
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
            }
        }
        
        function handleTagKeydown(e) {
            const data = panelState.editData;
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const tag = e.target.value.trim().replace(/^#/, '');
                if (tag && !data.tags.includes(tag)) {
                    data.tags.push(tag);
                    e.target.value = '';
                    syncLocalTask();  // FIX
                    if (!panelState.isNew && gristReady) saveTaskToGrist();
                    renderPanelTask();
                }
            } else if (e.key === 'Backspace' && !e.target.value && data.tags.length) {
                data.tags.pop();
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
            }
        }
        
        function removeTag(tag) {
            const data = panelState.editData;
            const idx = data.tags.indexOf(tag);
            if (idx !== -1) {
                data.tags.splice(idx, 1);
                syncLocalTask();  // FIX
                if (!panelState.isNew && gristReady) saveTaskToGrist();
                renderPanelTask();
            }
        }
        
        function showDeleteConfirm() { document.getElementById('deleteConfirm').classList.add('visible'); }
        function hideDeleteConfirm() { document.getElementById('deleteConfirm').classList.remove('visible'); }

        // ═══════════════════════════════════════════════════════════════════════
        // CRUD OPERATIONS
        // ═══════════════════════════════════════════════════════════════════════
        async function saveTaskToGrist() {
            const data = panelState.editData;
            if (!data || panelState.isNew || !gristReady) return;
            if (data.dateDebut && data.dateEcheance && data.dateDebut > data.dateEcheance) {
                showToast('La date de début ne peut pas dépasser la date de fin', 'error');
                return;
            }

            const record = {
                titre: data.titre,
                description: data.description,
                type: data.type,
                priorite: data.priorite,
                statut: data.statut,
                progression: data.progression,
                dateDebut: data.dateDebut,
                dateEcheance: data.dateEcheance,
                projet: data.projet,
                assignees: toGristRefList(data.assignees),
                dependDe: toGristRefList(data.dependDe),
                tags: toGristChoiceList(data.tags),
                estimationH: data.estimationH,
                tempsPasse: data.tempsPasse,
                subtasks: subtasksToJson(data.subtasks)
            };

            try {
                await grist.docApi.applyUserActions([['UpdateRecord', 'Tasks', panelState.taskId, record]]);
                showSaveIndicator();
            } catch (e) {
                showToast('Erreur de sauvegarde', 'error');
            }
        }
        
        async function createTask() {
            const data = panelState.editData;
            if (!data || !data.titre || !data.titre.trim()) {
                showToast('Le titre est requis', 'error');
                return;
            }
            if (data.dateDebut && data.dateEcheance && data.dateDebut > data.dateEcheance) {
                showToast('La date de début ne peut pas dépasser la date de fin', 'error');
                return;
            }

            const record = {
                titre: data.titre,
                description: data.description || '',
                type: data.type || 'tache',
                priorite: data.priorite || '3',
                statut: data.statut || 'todo',
                progression: data.progression || 0,
                dateDebut: data.dateDebut,
                dateEcheance: data.dateEcheance,
                projet: data.projet,
                assignees: toGristRefList(data.assignees),
                dependDe: toGristRefList(data.dependDe),
                tags: toGristChoiceList(data.tags),
                estimationH: data.estimationH,
                tempsPasse: data.tempsPasse,
                subtasks: subtasksToJson(data.subtasks)
            };

            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['AddRecord', 'Tasks', null, record]]);
                    showToast('Tâche créée', 'success');
                    await loadAllData();
                    backToPeriod();
                } catch (e) {
                    showToast('Erreur de création', 'error');
                }
            } else {
                record.id = Date.now();
                tasks.push(record);
                showToast('Tâche créée', 'success');
                render();
                backToPeriod();
            }
        }
        
        async function confirmDelete() {
            if (panelState.isNew || !panelState.taskId) return;
            
            if (gristReady) {
                try {
                    await grist.docApi.applyUserActions([['RemoveRecord', 'Tasks', panelState.taskId]]);
                    showToast('Tâche supprimée', 'success');
                    await loadAllData();
                    backToPeriod();
                } catch (e) {
                    showToast('Erreur de suppression', 'error');
                }
            } else {
                tasks = tasks.filter(t => t.id !== panelState.taskId);
                showToast('Tâche supprimée', 'success');
                render();
                backToPeriod();
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════════════
        async function initGrist() {
            try {
                await grist.ready({ requiredAccess: 'full' });
                await ensureSchema();
                await loadAllData();
                grist.onRecords(async () => await loadAllData());
                grist.onRecord((rec) => {
                    if (rec?.id && rec.id !== selectedTaskId) {
                        selectedTaskId = rec.id;
                        render();
                    }
                });
                // GEN-02: Synchronisation des filtres inter-widgets
                grist.onOptions((options, interaction) => {
                    if (options?.filters && interaction?.source !== 'self') {
                        const f = options.filters;
                        filters.project = Array.isArray(f.project) ? f.project : [];
                        filters.priority = Array.isArray(f.priority) ? f.priority : [];
                        filters.assignee = Array.isArray(f.assignee) ? f.assignee : [];
                        updateFilterMenus();
                        render();
                    }
                });
            } catch (e) {
                console.log('Grist unavailable, using demo');
                useDemoMode();
            }
        }
        
        function useDemoMode() {
            document.body.insertAdjacentHTML('beforeend', '<div class="demo-badge">Démo</div>');

            team = [
                { id: 1, nom: 'Alice Martin', actif: true, couleur: '#4f46e5' },
                { id: 2, nom: 'Bob Durant', actif: true, couleur: '#10b981' },
                { id: 3, nom: 'Claire Bernard', actif: true, couleur: '#f59e0b' }
            ];
            projects = [
                { id: 1, nom: 'Refonte Portail', couleur: '#4f46e5', actif: true },
                { id: 2, nom: 'App Mobile', couleur: '#10b981', actif: true },
                { id: 3, nom: 'API v2', couleur: '#f59e0b', actif: true }
            ];

            const today = new Date();
            const day = (d) => dateToGrist(new Date(today.getFullYear(), today.getMonth(), today.getDate() + d));

            tasks = [
                { id: 1, titre: 'Analyse besoins', priorite: '1', projet: 1, dateDebut: day(-10), dateEcheance: day(-5), progression: 100, statut: 'done', type: 'tache', assignees: ['L', 1], tags: ['L', 'documentation'] },
                { id: 2, titre: 'Dev Backend', priorite: '1', projet: 1, dateDebut: day(-4), dateEcheance: day(2), progression: 60, statut: 'inprogress', type: 'tache', dependDe: ['L', 1], assignees: ['L', 1, 2], estimationH: 32, tempsPasse: 12 },
                { id: 3, titre: 'Design UI', priorite: '2', projet: 2, dateDebut: day(-5), dateEcheance: day(1), progression: 80, statut: 'review', type: 'tache', assignees: ['L', 3] },
                { id: 4, titre: 'Livraison MVP', priorite: '1', projet: 1, dateDebut: day(15), dateEcheance: day(15), progression: 0, statut: 'todo', type: 'jalon', dependDe: ['L', 2], assignees: ['L', 1] },
                { id: 5, titre: 'Tests QA', priorite: '3', projet: 2, dateDebut: day(5), dateEcheance: day(12), progression: 0, statut: 'todo', type: 'tache', assignees: ['L', 2], tags: ['L', 'qa', 'tests'] },
                { id: 6, titre: 'Documentation', priorite: '4', projet: 3, dateDebut: day(-2), dateEcheance: day(-1), progression: 20, statut: 'inprogress', type: 'tache', assignees: ['L', 3] },
                { id: 7, titre: 'Correction bugs', priorite: '2', projet: 1, dateDebut: day(0), dateEcheance: day(3), progression: 10, statut: 'inprogress', type: 'tache', assignees: ['L', 2] },
                { id: 8, titre: 'Réunion client', priorite: '2', projet: 2, dateDebut: day(7), dateEcheance: day(7), progression: 0, statut: 'todo', type: 'reunion', assignees: ['L', 1, 3] },
                { id: 9, titre: 'Migration DB', priorite: '1', projet: 3, dateDebut: day(-3), dateEcheance: day(0), progression: 90, statut: 'review', type: 'tache', assignees: ['L', 1] },
                { id: 10, titre: 'Formation équipe', priorite: '3', projet: 1, dateDebut: day(10), dateEcheance: day(14), progression: 0, statut: 'todo', type: 'reunion', assignees: ['L', 2, 3] }
            ];

            updateFilterMenus();
            render();
        }

        // Event listeners
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.filter-dropdown')) {
                document.querySelectorAll('.filter-menu').forEach(m => m.classList.remove('open'));
            }
            if (!e.target.closest('.multi-select')) {
                document.querySelectorAll('.multi-select').forEach(s => s.classList.remove('open'));
            }
            // GEN-01: Désélection si clic en dehors d'un événement, du panel ou des contrôles
            if (!e.target.closest('.event-bar, .panel, .toolbar, .filter-dropdown, .view-controls, .day-cell, .week-panel')) {
                if (selectedTaskId !== null && !panelState.open) {
                    selectedTaskId = null;
                    render();
                }
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (panelState.open) closePanel();
            }
            if (panelState.open && panelState.mode === 'task' && !e.target.matches('input, textarea, select')) {
                if (e.key === 'ArrowLeft') navigatePanelTask(-1);
                if (e.key === 'ArrowRight') navigatePanelTask(1);
            }
        });

        const panelOverlay = document.getElementById('panelOverlay');
        panelOverlay.addEventListener('mousedown', (e) => { overlayPointerStart = { x: e.clientX, y: e.clientY }; });
        panelOverlay.addEventListener('mouseup', (e) => {
            const dx = Math.abs(e.clientX - overlayPointerStart.x);
            const dy = Math.abs(e.clientY - overlayPointerStart.y);
            if (dx < 5 && dy < 5) closePanel();
        });

        // Start
        // Initialiser la vue depuis localStorage
        document.querySelectorAll('.view-controls .btn').forEach(b => b.classList.toggle('active', b.id === 'btn' + currentView.charAt(0).toUpperCase() + currentView.slice(1)));
        // Initialiser l'affichage des grilles (un grid peut être partagé entre plusieurs vues)
        const _initGridId = VIEW_CONFIG[currentView]?.gridId;
        const _allGridIds = new Set(Object.values(VIEW_CONFIG).map(c => c.gridId));
        _allGridIds.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
        if (_initGridId) { const el = document.getElementById(_initGridId); if (el) el.style.display = VIEW_CONFIG[currentView].display; }
        initGrist();
    </script>
</body>
</html>
